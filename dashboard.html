<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - بوابة الفيزياء الحديثة</title>
    <style>
        body { background: #0d1117; color: #e0f7fa; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: rgba(255,255,255,0.04); padding: 40px; border-radius: 20px; border: 1px solid rgba(0,229,255,0.2); text-align: center; max-width: 600px; }
        h1 { color: #00e5ff; margin-bottom: 20px; }
        .btn-link { display: inline-block; padding: 15px 30px; background: #00e5ff; color: #0d1117; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-link:hover { transform: scale(1.05); box-shadow: 0 0 20px #00e5ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>مرحباً بك يا بطل الفيزياء!</h1>
        <p>لقد نجحت في الدخول إلى منصة الاختبارات.</p>
        <p>اضغط على الزر أدناه للبدء في اختباراتك التفاعلية.</p>
        <a href="https://sites.google.com/view/waloosky/" class="btn-link">الانتقال إلى منصة الاختبارات</a>
    </div>
</body>
</html>
